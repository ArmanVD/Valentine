<!doctype html>
<html lang="nl" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helaas...</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#800020" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background-color: #800020;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 32px;
      }

      .content {
        text-align: center;
        color: white;
        max-width: 360px;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 16px;
      }

      p {
        font-size: 18px;
        line-height: 1.6;
        opacity: 0.9;
        margin-bottom: 40px;
      }

      a {
        display: inline-block;
        padding: 16px 48px;
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        border-radius: 50px;
        border: 2px solid white;
        transition: background-color 0.3s ease;
      }

      a:hover {
        background-color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>#Mean ngl</h1>
      <p>Ik had natuurlijk al verwacht dat je grappig zou doen, dus ben ik er op voorbereid. Kies maar nog een keer!</p>
      <a href="index.html#keuze">Terug naar de keuze</a>
    </div>
  </body>
</html>
